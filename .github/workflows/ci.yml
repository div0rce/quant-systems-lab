name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-tidy clang-format

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

      - name: Differential fixture golden check
        run: make check-fixtures

      - name: Format check
        run: make fmt-check

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Build and test with ASan/UBSan
        run: |
          cmake --preset asan
          cmake --build --preset asan
          ctest --preset asan

  ocaml-verifier:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OCaml and dune
        run: |
          sudo apt-get update
          sudo apt-get install -y ocaml ocaml-dune

      - name: Build and test the OCaml replay verifier
        run: |
          cd ocaml
          dune build
          dune runtest

      - name: Differential failure artifact bundle
        if: failure()
        run: |
          cd ocaml
          mkdir -p _diff
          dune exec bin/diff_report.exe -- _diff \
            test/fixtures/stream_seed7.txt test/fixtures/stream_ioc.txt \
            test/fixtures/shrunk_seed1.txt test/fixtures/prop_seed*.txt || true

      - name: Upload differential failure bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: differential-failure-bundle
          path: ocaml/_diff
          if-no-files-found: ignore
